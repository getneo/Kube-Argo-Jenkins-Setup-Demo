apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: demo-app
subjects:
- kind: ServiceAccount
  name: demo-app
  namespace: demo-app
