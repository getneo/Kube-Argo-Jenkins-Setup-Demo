# Production Environment Values
# Override default values for production environment
# Note: For local Minikube with limited resources, using 2 replicas
# In real production with multiple nodes, increase to 3+

environment: production
replicaCount: 2

image:
  repository: demo-app
  tag: "1.0.0"
  pullPolicy: Always

# imagePullSecrets:
#   - name: registry-credentials

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: demo-app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: demo-app-tls #pragma: allowlist secret
      hosts:
        - demo-app.example.com

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2  # Reduced for local Minikube with limited resources
  maxReplicas: 5  # Reduced for local environment
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

podDisruptionBudget:
  enabled: true
  minAvailable: 2

configMap:
  create: true
  data:
    APP_NAME: "demo-app"
    ENVIRONMENT: "production"
    LOG_LEVEL: "warn"
    PORT: "8080"

serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

networkPolicy:
  enabled: true

# Use preferred anti-affinity for local/single-node setups
# For multi-node production, change to requiredDuringSchedulingIgnoredDuringExecution
affinity:
  podAntiAffinity:
    # Prefer spreading across nodes (soft requirement for local dev)
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - demo-app
          topologyKey: kubernetes.io/hostname
      # Spread across availability zones if available
      - weight: 50
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - demo-app
          topologyKey: topology.kubernetes.io/zone

# Production-specific labels
commonLabels:
  environment: production
  tier: frontend
  criticality: high

# Production-specific annotations
commonAnnotations:
  owner: sre-team
  contact: sre@example.com
  pagerduty: https://example.pagerduty.com/services/demo-app
