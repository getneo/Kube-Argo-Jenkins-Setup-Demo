# Jenkins Configuration as Code - Security Setup (Fixed)
# This version removes potential conflicts and uses simpler configuration

jenkins:
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          name: "Administrator"
          password: "${ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  remotingSecurity:
    enabled: true

  # Simplified crumb issuer (CSRF protection)
  crumbIssuer:
    standard: {}

security:
  apiToken:
    creationOfLegacyTokenEnabled: false
    tokenGenerationOnCreationEnabled: false
    usageStatisticsEnabled: true

  sSHD:
    port: -1  # Disable SSH server

unclassified:
  location:
    url: "http://jenkins.local:8080"

