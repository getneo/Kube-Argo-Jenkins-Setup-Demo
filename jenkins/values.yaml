# Jenkins Helm Chart Values
# Production-ready configuration for Kubernetes

controller:
  # Jenkins controller configuration
  componentName: "jenkins-controller"
  image:
    registry: "docker.io"
    repository: "jenkins/jenkins"
    tag: "2.440.1-lts-jdk17"
    pullPolicy: "IfNotPresent"

  # Resource limits
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"

  # Java options for performance
  javaOpts: >-
    -Xms2048m
    -Xmx2048m
    -XX:+UseG1GC
    -XX:+UseStringDeduplication
    -XX:+ParallelRefProcEnabled
    -XX:+DisableExplicitGC
    -Djava.awt.headless=true
    -Dhudson.model.DirectoryBrowserSupport.CSP="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';"

  # Jenkins URL (update with your domain or use NodePort)
  jenkinsUrl: "http://jenkins.local:8080"
  jenkinsUriPrefix: "/"

  # Admin user configuration
  adminUser: "admin"
  # Admin password will be auto-generated and stored in secret
  # Retrieve with: kubectl get secret jenkins -n jenkins -o jsonpath='{.data.jenkins-admin-password}' | base64 -d

  # Number of executors on controller (keep low, use agents)
  numExecutors: 0

  # Security realm
  securityRealm: |-
    local:
      allowsSignup: false
      enableCaptcha: false
      users:
      - id: "${chart-admin-username}"
        name: "Jenkins Admin"
        password: "${chart-admin-password}"

  # Authorization strategy
  authorizationStrategy: |-
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  # Install plugins
  installPlugins:
    # Essential plugins
    - kubernetes:4029.v5712230ccb_f8
    - workflow-aggregator:596.v8c21c963d92d
    - git:5.2.0
    - configuration-as-code:1670.v564dc8b_982d0

    # SCM plugins
    - github:1.37.3.1
    - github-branch-source:1728.v859147241f49
    - gitlab-plugin:1.7.15
    - bitbucket:223.vd12f2bca5430

    # Build tools
    - docker-workflow:572.v950f58993843
    - docker-plugin:1.5
    - pipeline-stage-view:2.33

    # Credentials
    - credentials-binding:631.v861e8e2d4d7a_
    - plain-credentials:143.v1b_df8b_d3b_e48
    - ssh-credentials:305.v8f4381501156

    # Notifications
    - slack:664.vc9a_90f8b_c24a_
    - email-ext:2.96
    - mailer:463.vedf8358e006b_

    # Monitoring
    - prometheus:2.2.3
    - metrics:4.2.13-420.vea_2f17932dd6

    # Security
    - matrix-auth:3.2.1
    - role-strategy:669.v5b_205b_a_67d50

    # Utilities
    - timestamper:1.25
    - ws-cleanup:0.45
    - build-timeout:1.31
    - ansicolor:1.0.2
    - pipeline-utility-steps:2.16.0

  # Additional plugins (optional)
  additionalPlugins:
    - blueocean:1.27.9
    - kubernetes-cli:1.12.1
    - job-dsl:1.84
    - pipeline-github-lib:38.v445716ea_edda_

  # Jenkins Configuration as Code (JCasC)
  JCasC:
    defaultConfig: true
    configScripts:
      welcome-message: |
        jenkins:
          systemMessage: |
            Welcome to Jenkins on Kubernetes!
            This Jenkins instance is configured using Configuration as Code.

            Environment: Development
            Cluster: Minikube Local

      kubernetes-cloud: |
        jenkins:
          clouds:
            - kubernetes:
                name: "kubernetes"
                serverUrl: "https://kubernetes.default"
                namespace: "jenkins"
                jenkinsUrl: "http://jenkins:8080"
                jenkinsTunnel: "jenkins-agent:50000"
                containerCapStr: "10"
                maxRequestsPerHostStr: "32"
                retentionTimeout: 5
                connectTimeout: 10
                readTimeout: 20

                templates:
                  - name: "jenkins-agent"
                    namespace: "jenkins"
                    label: "jenkins-agent"
                    nodeUsageMode: NORMAL
                    containers:
                      - name: "jnlp"
                        image: "jenkins/inbound-agent:latest"
                        alwaysPullImage: false
                        workingDir: "/home/jenkins/agent"
                        ttyEnabled: true
                        resourceRequestCpu: "500m"
                        resourceRequestMemory: "512Mi"
                        resourceLimitCpu: "1000m"
                        resourceLimitMemory: "1Gi"

                    volumes:
                      - emptyDirVolume:
                          memory: false
                          mountPath: "/tmp"

                    yaml: |
                      apiVersion: v1
                      kind: Pod
                      spec:
                        securityContext:
                          runAsUser: 1000
                          fsGroup: 1000

                  - name: "docker-agent"
                    namespace: "jenkins"
                    label: "docker"
                    nodeUsageMode: NORMAL
                    containers:
                      - name: "docker"
                        image: "docker:24-dind"
                        alwaysPullImage: false
                        workingDir: "/home/jenkins/agent"
                        ttyEnabled: true
                        privileged: true
                        resourceRequestCpu: "500m"
                        resourceRequestMemory: "1Gi"
                        resourceLimitCpu: "2000m"
                        resourceLimitMemory: "2Gi"
                        command: "dockerd-entrypoint.sh"
                      - name: "jnlp"
                        image: "jenkins/inbound-agent:latest"
                        alwaysPullImage: false
                        workingDir: "/home/jenkins/agent"
                        ttyEnabled: true
                        resourceRequestCpu: "200m"
                        resourceRequestMemory: "256Mi"
                        resourceLimitCpu: "500m"
                        resourceLimitMemory: "512Mi"

                  - name: "go-agent"
                    namespace: "jenkins"
                    label: "golang"
                    nodeUsageMode: NORMAL
                    containers:
                      - name: "golang"
                        image: "golang:1.21"
                        alwaysPullImage: false
                        workingDir: "/home/jenkins/agent"
                        ttyEnabled: true
                        command: "cat"
                        resourceRequestCpu: "500m"
                        resourceRequestMemory: "512Mi"
                        resourceLimitCpu: "1000m"
                        resourceLimitMemory: "1Gi"
                      - name: "jnlp"
                        image: "jenkins/inbound-agent:latest"
                        alwaysPullImage: false
                        workingDir: "/home/jenkins/agent"
                        ttyEnabled: true

      security-settings: |
        jenkins:
          securityRealm:
            local:
              allowsSignup: false
          authorizationStrategy:
            loggedInUsersCanDoAnything:
              allowAnonymousRead: false

          remotingSecurity:
            enabled: true

          crumbIssuer:
            standard:
              excludeClientIPFromCrumb: false

      global-libraries: |
        unclassified:
          globalLibraries:
            libraries:
              - name: "shared-library"
                defaultVersion: "main"
                implicit: false
                allowVersionOverride: true
                retriever:
                  modernSCM:
                    scm:
                      git:
                        remote: "https://github.com/your-org/jenkins-shared-library.git"

  # Ingress configuration
  ingress:
    enabled: true
    apiVersion: "networking.k8s.io/v1"
    annotations:
      kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    hostName: jenkins.local
    path: /
    pathType: Prefix

  # Service configuration
  serviceType: ClusterIP
  servicePort: 8080
  targetPort: 8080

  # Agent listener service
  agentListenerServiceType: ClusterIP

  # Health probes
  healthProbes: true
  healthProbesLivenessTimeout: 5
  healthProbesReadinessTimeout: 5
  healthProbeLivenessPeriodSeconds: 10
  healthProbeReadinessPeriodSeconds: 10
  healthProbeLivenessFailureThreshold: 5
  healthProbeReadinessFailureThreshold: 3
  healthProbeLivenessInitialDelay: 90
  healthProbeReadinessInitialDelay: 60

  # Prometheus monitoring
  prometheus:
    enabled: true
    serviceMonitorNamespace: "monitoring"
    serviceMonitorAdditionalLabels:
      release: prometheus

# Persistence configuration
persistence:
  enabled: true
  existingClaim: ""
  storageClass: "standard"
  accessMode: "ReadWriteOnce"
  size: "20Gi"
  volumes: []
  mounts: []

# Service Account
serviceAccount:
  create: true
  name: jenkins
  annotations: {}

# RBAC
rbac:
  create: true
  readSecrets: true

# Network Policy
networkPolicy:
  enabled: true
  apiVersion: networking.k8s.io/v1
  internalAgents:
    allowed: true
    namespaceLabels:
      name: "jenkins"

# Backup configuration (optional)
backup:
  enabled: false
  schedule: "0 2 * * *"
  annotations: {}
