# Resource Quotas for Namespaces
# These quotas prevent any single namespace from consuming all cluster resources
# Following SRE best practices for resource management

---
# Jenkins namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: jenkins-quota
  namespace: jenkins
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "6"
    limits.memory: 12Gi
    persistentvolumeclaims: "5"
---
# ArgoCD namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: argocd-quota
  namespace: argocd
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 6Gi
---
# Monitoring namespace quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: monitoring-quota
  namespace: monitoring
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 6Gi
    limits.cpu: "5"
    limits.memory: 10Gi
    persistentvolumeclaims: "10"
---
# Demo app namespace quota
# Increased for local development with 3 environments (dev, staging, prod)
apiVersion: v1
kind: ResourceQuota
metadata:
  name: demo-app-quota
  namespace: demo-app
spec:
  hard:
    requests.cpu: "3"
    requests.memory: 3Gi
    limits.cpu: "6"
    limits.memory: 6Gi
    pods: "15"
