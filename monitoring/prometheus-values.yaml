# Prometheus Stack Helm Chart Values
# Optimized for local Minikube development

# Global settings
global:
  rbac:
    create: true

# Prometheus Operator
prometheusOperator:
  enabled: true

  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # Config reloader sidecar resources
  prometheusConfigReloader:
    resources:
      requests:
        cpu: 50m
        memory: 50Mi
      limits:
        cpu: 100m
        memory: 100Mi

  admissionWebhooks:
    enabled: true
    patch:
      enabled: true

# Prometheus Server
prometheus:
  enabled: true

  prometheusSpec:
    # Retention period
    retention: 7d
    retentionSize: "5GB"

    # Resource limits (minimal for Minikube with other components)
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi

    # Storage configuration
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Service monitor selector - monitor all namespaces
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    # Pod monitor selector
    podMonitorSelector: {}
    podMonitorNamespaceSelector: {}

    # Rule selector
    ruleSelector: {}
    ruleNamespaceSelector: {}

    # Scrape interval
    scrapeInterval: 30s
    evaluationInterval: 30s

    # External labels
    externalLabels:
      cluster: minikube-local
      environment: development

    # Replicas (1 for local dev)
    replicas: 1

    # Security context
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000

    # Disable admin API for security
    enableAdminAPI: false

# Alertmanager
alertmanager:
  enabled: true

  alertmanagerSpec:
    # Resource limits
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 100m
        memory: 256Mi

    # Storage
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: standard
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 2Gi

    # Replicas
    replicas: 1

    # Security context
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000

# Grafana
grafana:
  enabled: true

  # Admin credentials
  adminPassword:

  # Resource limits
  resources:
    limits:
      cpu: 200m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

  # Persistence
  persistence:
    enabled: true
    storageClassName: standard
    size: 5Gi

  # Datasources - Let the chart create the default Prometheus datasource
  # The chart automatically configures Prometheus as a datasource

  # Default dashboards
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default

  # Pre-installed dashboards
  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Prometheus
      node-exporter:
        gnetId: 1860
        revision: 27
        datasource: Prometheus

  # Ingress
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - grafana.local
    path: /
    pathType: Prefix

  # Service
  service:
    type: ClusterIP
    port: 80

# Node Exporter
nodeExporter:
  enabled: true

  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Kube State Metrics
kubeStateMetrics:
  enabled: true

  resources:
    limits:
      cpu: 50m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi

# Prometheus Node Exporter
prometheus-node-exporter:
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Default rules
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false  # Not applicable for Minikube
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverSlos: false  # Reduce noise
    kubelet: true
    kubeProxy: false  # Not applicable for Minikube
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeScheduler: false  # Not applicable for Minikube
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

# CoreDNS monitoring
coreDns:
  enabled: true

# Kube Controller Manager
kubeControllerManager:
  enabled: false  # Not accessible in Minikube

# Kube Scheduler
kubeScheduler:
  enabled: false  # Not accessible in Minikube

# Kube Proxy
kubeProxy:
  enabled: false  # Not accessible in Minikube

# Kube Etcd
kubeEtcd:
  enabled: false  # Not accessible in Minikube
